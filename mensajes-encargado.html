<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mensajes – Encargado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="custom.css" rel="stylesheet">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div class="topbar d-flex align-items-center justify-content-between">
    <div><h5 class="fw-bold mb-0">Mensajes de Estudiantes</h5><p class="small text-muted mb-0">Consultas sobre equipos y laboratorio</p></div>
    <select class="form-select form-select-sm" style="width:auto;" id="filtro-estado" onchange="loadMensajes()">
      <option value="">Todos</option>
      <option value="SIN_RESPUESTA">Sin responder</option>
      <option value="RESPONDIDO">Respondidos</option>
    </select>
  </div>
  <div class="p-4">
    <div class="row g-4">
      <div class="col-md-5">
        <div class="card">
          <div class="card-header py-3 px-4 d-flex justify-content-between align-items-center">
            <span class="fw-bold"><i class="bi bi-inbox me-2"></i>Bandeja de Entrada</span>
            <span class="badge bg-warning text-dark rounded-pill" id="sin-responder-count">0 sin responder</span>
          </div>
          <div class="list-group list-group-flush" id="mensajes-lista">
            <div class="text-center text-muted py-4">Cargando...</div>
          </div>
        </div>
      </div>
      <div class="col-md-7">
        <div class="card" id="card-detalle">
          <div class="card-header py-3 px-4">
            <span class="fw-bold" id="detalle-asunto">Selecciona un mensaje</span>
            <div class="mt-1" id="detalle-meta"></div>
          </div>
          <div class="card-body" id="detalle-cuerpo">
            <div class="text-center text-muted py-5">
              <i class="bi bi-envelope-open fs-1"></i>
              <p class="mt-2">Selecciona un mensaje de la bandeja para ver los detalles</p>
            </div>
            <form id="reply-form" class="d-none" novalidate>
              <div class="mb-3"><label class="form-label small fw-semibold text-uppercase text-muted">Tu respuesta *</label>
                <textarea id="respuesta" class="form-control" rows="4" placeholder="Escribe tu respuesta..." required maxlength="2000"></textarea>
                <div class="invalid-feedback">La respuesta no puede estar vacía.</div>
                <div class="form-text text-end"><span id="rc">0</span>/2000</div>
              </div>
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-primary" onclick="enviarResp()"><i class="bi bi-send me-1"></i>Enviar Respuesta</button>
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="eliminarMsg()"><i class="bi bi-trash me-1"></i>Eliminar</button>
              </div>
            </form>
            <div id="resp-ok" class="d-none mt-3">
              <div class="alert alert-success small"><i class="bi bi-check-circle me-1"></i>Respuesta enviada correctamente.</div>
              <div class="p-3 rounded-3" style="background:#d1fae5;border:1px solid #a7f3d0;">
                <div class="d-flex justify-content-between mb-1"><strong>Encargado (Tú)</strong><small class="font-monospace text-muted">Ahora</small></div>
                <p id="resp-text" class="mb-0 small"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { getMessages, respondMessage, markMessageAsRead, getUser, showError, showSuccess, checkRole } from './api.js';

if (!checkRole('encargado')) {
    throw new Error('Unauthorized');
}

const user = getUser();
buildNav(user.role, 'mensajes-encargado.html');

let mensajes = [];
let mensajeActual = null;

document.getElementById('respuesta').addEventListener('input', function() {
    document.getElementById('rc').textContent = this.value.length;
});

async function loadMensajes() {
  try {
    const result = await getMessages(1, 50);
    mensajes = result.data || [];
    
    const filtro = document.getElementById('filtro-estado').value;
    let filtrados = mensajes;
    if (filtro === 'SIN_RESPUESTA') {
      filtrados = mensajes.filter(m => !m.response?.content);
    } else if (filtro === 'RESPONDIDO') {
      filtrados = mensajes.filter(m => m.response?.content);
    }
    
    const sinResponder = mensajes.filter(m => !m.response?.content).length;
    document.getElementById('sin-responder-count').textContent = `${sinResponder} sin responder`;
    
    renderLista(filtrados);
  } catch (error) {
    console.error('Error cargando mensajes:', error);
    document.getElementById('mensajes-lista').innerHTML = 
      '<div class="text-center text-muted py-4">Error al cargar mensajes</div>';
  }
}

function renderLista(lista) {
  const container = document.getElementById('mensajes-lista');
  
  if (lista.length === 0) {
    container.innerHTML = '<div class="text-center text-muted py-4">No hay mensajes</div>';
    return;
  }
  
  container.innerHTML = lista.map(m => {
    const fecha = new Date(m.createdAt).toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
    const hasResponse = !!m.response?.content;
    
    return `
      <div class="list-group-item list-group-item-action p-3 cursor-pointer" onclick="seleccionarMensaje('${m._id}')">
        <div class="d-flex justify-content-between">
          <strong>${m.student?.name || 'Estudiante'}</strong>
          <small class="font-monospace">${fecha}</small>
        </div>
        <p class="mb-1 small fw-semibold">${m.subject || 'Sin asunto'}</p>
        ${hasResponse 
          ? '<span class="badge badge-soft-success rounded-pill small">Respondido ✓</span>' 
          : '<span class="badge badge-soft-warning rounded-pill small">Sin responder</span>'}
      </div>
    `;
  }).join('');
}

window.seleccionarMensaje = function(id) {
  mensajeActual = mensajes.find(m => m._id === id);
  if (!mensajeActual) return;
  
  document.getElementById('detalle-asunto').textContent = mensajeActual.subject || 'Sin asunto';
  document.getElementById('detalle-meta').innerHTML = `
    <span class="badge badge-soft-muted rounded-pill small">De: ${mensajeActual.student?.name || 'Estudiante'}</span>
    ${mensajeActual.product ? `<span class="badge badge-soft-info rounded-pill small ms-1">Equipo: ${mensajeActual.product.name}</span>` : ''}
  `;
  
  const fecha = new Date(mensajeActual.createdAt).toLocaleDateString('es-MX', { 
    day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' 
  });
  
  const cuerpo = document.getElementById('detalle-cuerpo');
  cuerpo.innerHTML = `
    <div class="p-3 rounded-3 mb-4" style="background:#f7f9fb;border:1px solid #dde3ea;">
      <div class="d-flex justify-content-between mb-2">
        <strong>${mensajeActual.student?.name || 'Estudiante'}</strong>
        <small class="font-monospace text-muted">${fecha}</small>
      </div>
      <p class="mb-0" style="font-size:13.5px;">${mensajeActual.content || ''}</p>
    </div>
    ${mensajeActual.response?.content ? `
    <div class="p-3 rounded-3 mb-4" style="background:#d1fae5;border:1px solid #a7f3d0;">
      <div class="d-flex justify-content-between mb-1">
        <strong>Encargado (Tú)</strong>
        <small class="font-monospace text-muted">${mensajeActual.response.date ? new Date(mensajeActual.response.date).toLocaleDateString('es-MX') : ''}</small>
      </div>
      <p class="mb-0 small">${mensajeActual.response.content}</p>
    </div>
    ` : ''}
    <form id="reply-form" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold text-uppercase text-muted">Tu respuesta *</label>
        <textarea id="respuesta" class="form-control" rows="4" placeholder="Escribe tu respuesta..." required maxlength="2000"></textarea>
        <div class="invalid-feedback">La respuesta no puede estar vacía.</div>
        <div class="form-text text-end"><span id="rc">0</span>/2000</div>
      </div>
      <div class="d-flex gap-2">
        <button type="button" class="btn btn-primary" onclick="enviarResp()"><i class="bi bi-send me-1"></i>Enviar Respuesta</button>
        <button type="button" class="btn btn-outline-danger btn-sm" onclick="eliminarMsg()"><i class="bi bi-trash me-1"></i>Eliminar</button>
      </div>
    </form>
    <div id="resp-ok" class="d-none mt-3">
      <div class="alert alert-success small"><i class="bi bi-check-circle me-1"></i>Respuesta enviada correctamente.</div>
      <div class="p-3 rounded-3" style="background:#d1fae5;border:1px solid #a7f3d0;">
        <div class="d-flex justify-content-between mb-1"><strong>Encargado (Tú)</strong><small class="font-monospace text-muted">Ahora</small></div>
        <p id="resp-text" class="mb-0 small"></p>
      </div>
    </div>
  `;
  
  document.getElementById('respuesta').addEventListener('input', function() {
    document.getElementById('rc').textContent = this.value.length;
  });
  
  if (mensajeActual.response) {
    document.getElementById('reply-form').classList.add('d-none');
  } else {
    document.getElementById('reply-form').classList.remove('d-none');
    document.getElementById('resp-ok').classList.add('d-none');
  }
};

window.enviarResp = async function() {
  const r = document.getElementById('respuesta');
  if (!r.value.trim()) {
    r.classList.add('is-invalid');
    return;
  }
  r.classList.remove('is-invalid');
  
  try {
    await respondMessage(mensajeActual._id, r.value.trim());
    document.getElementById('resp-text').textContent = r.value;
    document.getElementById('reply-form').classList.add('d-none');
    document.getElementById('resp-ok').classList.remove('d-none');
    showSuccess('Respuesta enviada');
    loadMensajes();
  } catch (error) {
    showError('Error al enviar respuesta');
  }
};

window.eliminarMsg = function() {
  if (confirm('¿Eliminar este mensaje?')) {
    showSuccess('Mensaje eliminado');
  }
};

window.loadMensajes = loadMensajes;

loadMensajes();
</script>
</body>
</html>
