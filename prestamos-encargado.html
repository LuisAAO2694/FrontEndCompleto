<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Préstamos Activos – Encargado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="custom.css" rel="stylesheet">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div class="topbar d-flex align-items-center justify-content-between">
    <div><h5 class="fw-bold mb-0">Préstamos Activos</h5><p class="small text-muted mb-0">Gestiona entregas y devoluciones</p></div>
  </div>
  <div class="p-4">
    <div class="card"><div class="card-header py-3 px-4 d-flex justify-content-between align-items-center">
      <span class="fw-bold"><i class="bi bi-box-seam-fill me-2 text-primary"></i>Préstamos en Curso (<span id="total-prestamos">0</span>)</span>
      <div class="d-flex gap-2">
        <div class="input-group input-group-sm" style="width:200px;">
          <span class="input-group-text bg-light"><i class="bi bi-search text-muted"></i></span>
          <input type="text" id="buscar" class="form-control" placeholder="Buscar estudiante..." onkeyup="debounceSearch()">
        </div>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead><tr><th>Folio</th><th>Estudiante</th><th>Equipos</th><th>Laboratorio</th><th>Inicio</th><th>Vencimiento</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody id="prestamos-tbody">
          <tr><td colspan="8" class="text-center text-muted py-4">Cargando préstamos...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="card-footer bg-transparent d-flex justify-content-center py-3">
      <nav><ul class="pagination pagination-sm mb-0" id="paginacion"></ul></nav>
    </div>
  </div>
</div>

<div class="modal fade" id="modalDev" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content rounded-4">
  <div class="modal-header border-0"><h5 class="modal-title fw-bold"><i class="bi bi-box-arrow-in-down me-2"></i>Registrar Devolución – <span id="folio-label"></span></h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body" id="dev-modal-body">
    <p class="text-center text-muted">Cargando...</p>
  </div>
  <div class="modal-footer border-0">
    <button class="btn btn-success" id="confirm-dev-btn" onclick="confirmarDevolucion()"><i class="bi bi-check-lg me-1"></i>Confirmar Devolución</button>
    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
  </div>
</div></div>

<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { getLoans, getProducts, registerDevolutions, deliverLoan, getUser, showError, showSuccess, checkRole } from './api.js';

let productsMap = {};

if (!checkRole('encargado')) {
    throw new Error('Unauthorized');
}

const user = getUser();
buildNav(user.role, 'prestamos-encargado.html');

let prestamos = [];
let currentPage = 1;
let selectedLoan = null;

async function init() {
  const prods = await getProducts({ limit: 100 });
  prods.data.forEach(p => {
    productsMap[p._id] = p;
  });
  loadPrestamos();
}

async function loadPrestamos() {
  try {
    const result = await getLoans({ page: 1, limit: 100 });
    prestamos = result.data;
    renderPrestamos(result.total);
  } catch (error) {
    showError('Error al cargar préstamos');
  }
}

function renderPrestamos(total) {
  const tbody = document.getElementById('prestamos-tbody');
  const searchTerm = document.getElementById('buscar').value.trim().toLowerCase();
  
  const prestamosFiltrados = prestamos.filter(l => {
    if (!['APROBADO', 'ACTIVO'].includes(l.status)) return false;
    if (searchTerm) {
      const studentName = (l.student?.name || '').toLowerCase();
      const studentId = (l.student?.studentId || '').toLowerCase();
      return studentName.includes(searchTerm) || studentId.includes(searchTerm);
    }
    return true;
  });
  
  if (prestamosFiltrados.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No hay préstamos en curso</td></tr>';
    document.getElementById('total-prestamos').textContent = '0';
    return;
  }

  document.getElementById('total-prestamos').textContent = prestamosFiltrados.length;
  const now = new Date();
  tbody.innerHTML = prestamosFiltrados.map(loan => {
    const diasRestantes = Math.ceil((new Date(loan.estimatedReturnDate) - now) / (1000 * 60 * 60 * 24));
    const isVencido = diasRestantes < 0;
    const isPorVencer = diasRestantes >= 0 && diasRestantes <= 3;
    
    let estado = loan.status;
    let estadoClass = loan.status === 'APROBADO' ? 'badge-soft-info' : 'badge-soft-success';
    let bgStyle = '';
    
    if (loan.status === 'APROBADO') {
      estado = 'APROBADO - Por entregar';
      estadoClass = 'badge-soft-info';
    } else if (isVencido) {
      estado = `VENCIDO (${Math.abs(diasRestantes)}d)`;
      estadoClass = 'badge-soft-danger';
      bgStyle = 'background:#fff5f5;';
    } else if (isPorVencer) {
      estado = `POR VENCER (${diasRestantes}d)`;
      estadoClass = 'badge-soft-danger';
      bgStyle = 'background:#fff5f5;';
    }

    const equipos = loan.equipment.map(e => e.product?.name || 'Equipo').join(', ');
    const productId = loan.equipment[0]?.product?._id;
    const product = productsMap[productId] || {};
    const laboratorio = product.laboratory || '-';

    return `
      <tr style="${bgStyle}">
        <td><code>#${loan._id.slice(-6).toUpperCase()}</code></td>
        <td><strong>${loan.student?.name || 'Estudiante'}</strong>${loan.student?.studentId ? '<br><small class="font-monospace text-muted">' + loan.student.studentId + '</small>' : ''}</td>
        <td>${equipos}</td>
        <td>${laboratorio}</td>
        <td class="font-monospace small">${loan.startDate ? new Date(loan.startDate).toLocaleDateString('es-MX', {day:'numeric', month:'short'}) : '-'}</td>
        <td class="font-monospace ${isVencido || isPorVencer ? 'fw-bold text-danger' : ''}">${new Date(loan.estimatedReturnDate).toLocaleDateString('es-MX', {day:'numeric', month:'short'})}${isVencido ? ' 🚨' : isPorVencer ? ' ⚠️' : ''}</td>
        <td><span class="badge ${estadoClass} rounded-pill">${estado}</span></td>
        <td>${loan.status === 'APROBADO' 
          ? `<button class="btn btn-primary btn-sm" onclick="abrirEntrega('${loan._id}')"><i class="bi bi-box-arrow-right me-1"></i>Entregar</button>`
          : `<button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalDev" onclick="abrirDevolucion('${loan._id}')"><i class="bi bi-box-arrow-in-down me-1"></i>Devolver</button>`}</td>
      </tr>
    `;
  }).join('');
}

window.abrirDevolucion = function(id) {
  selectedLoan = prestamos.find(p => p._id === id);
  if (!selectedLoan) return;
  
  document.getElementById('folio-label').textContent = '#' + selectedLoan._id.slice(-6).toUpperCase();
  
  const body = document.getElementById('dev-modal-body');
  body.innerHTML = selectedLoan.equipment.map(eq => `
    <div class="border rounded-3 p-3 mb-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <strong>${eq.product?.name || 'Equipo'}</strong>
        <code class="small text-muted">${eq.product?.serialNumber || 'N/A'}</code>
      </div>
      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label small fw-semibold text-uppercase text-muted">Estado de devolución *</label>
          <select class="form-select form-select-sm" id="dev-estado-${eq.product?._id}">
            <option value="DEVUELTO">✅ DEVUELTO – Buen estado</option>
            <option value="DEVUELTO_DAÑADO">⚠️ DEVUELTO_DAÑADO – Con daños</option>
            <option value="NO_DEVUELTO">🚨 NO_DEVUELTO – No entregado</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold text-uppercase text-muted">Observaciones</label>
          <input type="text" class="form-control form-control-sm" id="dev-obs-${eq.product?._id}" placeholder="Opcional...">
        </div>
      </div>
    </div>
  `).join('') + '<div class="alert alert-info small"><i class="bi bi-info-circle me-1"></i>Los equipos en estado DEVUELTO regresarán a DISPONIBLE automáticamente.</div>';
};

window.confirmarDevolucion = async function() {
  if (!selectedLoan) return;
  
  const devoluciones = selectedLoan.equipment.map(eq => ({
    product: eq.product?._id,
    returnStatus: document.getElementById('dev-estado-' + eq.product?._id)?.value || 'DEVUELTO',
    observations: document.getElementById('dev-obs-' + eq.product?._id)?.value || ''
  }));
  
  try {
    await registerDevolutions(selectedLoan._id, devoluciones);
    const modal = bootstrap.Modal.getInstance(document.getElementById('modalDev'));
    modal.hide();
    showSuccess('Devolución registrada correctamente');
    loadPrestamos();
  } catch (error) {
    showError(error.message || 'Error al registrar devolución');
  }
};

window.abrirEntrega = async function(id) {
  if (!confirm('¿Confirmar la entrega del equipo al estudiante?')) return;
  try {
    await deliverLoan(id);
    showSuccess('Préstamo entregado correctamente');
    loadPrestamos();
  } catch (error) {
    showError(error.message || 'Error al entregar préstamo');
  }
};

let debounceTimer;
window.debounceSearch = function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    currentPage = 1;
    loadPrestamos();
  }, 300);
};

init();
</script>
</body>
</html>
