<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Historial de Préstamos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="custom.css" rel="stylesheet">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div class="topbar d-flex align-items-center justify-content-between">
    <div><h5 class="fw-bold mb-0">Historial de Préstamos</h5><p class="small text-muted mb-0">Registro completo de todos tus préstamos</p></div>
  </div>
  <div class="p-4">
    <div class="card mb-4">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-3"><label class="form-label small text-muted text-uppercase fw-semibold">Fecha inicio</label><input type="date" id="fecha-inicio" class="form-control"></div>
          <div class="col-md-3"><label class="form-label small text-muted text-uppercase fw-semibold">Fecha fin</label><input type="date" id="fecha-fin" class="form-control"></div>
          <div class="col-md-3"><label class="form-label small text-muted text-uppercase fw-semibold">Estado</label>
            <select id="estado-filter" class="form-select"><option value="">Todos</option><option>FINALIZADO</option><option>CANCELADO</option><option>RECHAZADO</option></select>
          </div>
          <div class="col-md-3 d-flex gap-2">
            <button class="btn btn-primary btn-sm flex-fill" onclick="filtrarHistorial()">Filtrar</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header py-3 px-4"><span class="fw-bold"><i class="bi bi-clock-history me-2 text-primary"></i>Historial Completo (<span id="total-registros">0</span> registros)</span></div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead><tr><th>Folio</th><th>Equipos</th><th>Categoría</th><th>Préstamo</th><th>Devolución</th><th>Estado</th><th></th></tr></thead>
          <tbody id="historial-tbody">
            <tr><td colspan="7" class="text-center text-muted py-4">Cargando historial...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="card-footer bg-transparent d-flex justify-content-center py-3">
        <nav><ul class="pagination pagination-sm mb-0" id="paginacion"></ul></nav>
      </div>
    </div>
  </div>
</div>
<div class="modal fade" id="modalHist" tabindex="-1"><div class="modal-dialog"><div class="modal-content rounded-4">
  <div class="modal-header border-0"><h5 class="modal-title fw-bold">📋 Detalle Préstamo</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body" id="modal-detalle"></div>
  <div class="modal-footer border-0"><button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button></div>
</div></div></div>
<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { getMyLoans, getUser, checkRole } from './api.js';

if (!checkRole('estudiante')) {
    throw new Error('Unauthorized');
}

const user = getUser();
buildNav(user.role, 'historial-prestamos.html');

let currentPage = 1;

async function loadHistorial() {
  try {
    const result = await getMyLoans('historial', currentPage, 20);
    document.getElementById('total-registros').textContent = result.total;
    renderHistorial(result.data);
    renderPagination(result.total);
  } catch (error) {
    console.error('Error:', error);
  }
}

function renderHistorial(loans) {
  const tbody = document.getElementById('historial-tbody');
  
  if (loans.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No hay registros en el historial</td></tr>';
    return;
  }
  
  tbody.innerHTML = loans.map(loan => {
    const statusClass = {
      'FINALIZADO': 'badge-soft-success',
      'RECHAZADO': 'badge-soft-danger',
      'CANCELADO': 'badge-soft-muted',
      'PARCIALMENTE_DEVUELTO': 'badge-soft-warning'
    }[loan.status] || 'badge-soft-secondary';
    
    return `<tr>
      <td><code>#${loan._id.slice(-6).toUpperCase()}</code></td>
      <td>${loan.equipment.map(e => e.product?.name || 'Equipo').join(', ')}</td>
      <td>${loan.equipment[0]?.product?.category || '-'}</td>
      <td>${new Date(loan.createdAt).toLocaleDateString('es-MX')}</td>
      <td>${loan.actualReturnDate ? new Date(loan.actualReturnDate).toLocaleDateString('es-MX') : '—'}</td>
      <td><span class="badge ${statusClass} rounded-pill">${loan.status}</span></td>
      <td><button class="btn btn-outline-secondary btn-sm" onclick="verDetalle('${loan._id}')">Ver</button></td>
    </tr>`;
  }).join('');
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / 20);
  const pag = document.getElementById('paginacion');
  if (totalPages <= 1) {
    pag.innerHTML = '';
    return;
  }
  
  let html = `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage - 1})">‹</a></li>`;
  for (let i = 1; i <= totalPages; i++) {
    html += `<li class="page-item ${currentPage === i ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
  }
  html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage + 1})">›</a></li>`;
  pag.innerHTML = html;
}

window.changePage = function(page) {
  currentPage = page;
  loadHistorial();
};

window.filtrarHistorial = function() {
  currentPage = 1;
  loadHistorial();
};

window.verDetalle = async function(id) {
  try {
    const { getLoanById } = await import('./api.js');
    const loan = await getLoanById(id);
    const modalBody = document.getElementById('modal-detalle');
    
    const equiposHtml = loan.equipment.map(e => `
      <div class="col-6"><label class="form-label small text-uppercase text-muted fw-semibold">Equipo</label><p class="mb-0">${e.product?.name || 'Equipo'}</p></div>
      <div class="col-6"><label class="form-label small text-uppercase text-muted fw-semibold">Estado</label><p class="mb-0">${e.status}</p></div>
    `).join('');
    
    modalBody.innerHTML = `
      <div class="row g-3">
        ${equiposHtml}
        <div class="col-6"><label class="form-label small text-uppercase text-muted fw-semibold">Fecha préstamo</label><p class="mb-0 font-monospace">${new Date(loan.createdAt).toLocaleDateString('es-MX')}</p></div>
        <div class="col-6"><label class="form-label small text-uppercase text-muted fw-semibold">Fecha devolución</label><p class="mb-0 font-monospace">${loan.actualReturnDate ? new Date(loan.actualReturnDate).toLocaleDateString('es-MX') : '—'}</p></div>
        <div class="col-6"><label class="form-label small text-uppercase text-muted fw-semibold">Aprobado por</label><p class="mb-0">${loan.managedBy?.name || '—'}</p></div>
        <div class="col-6"><label class="form-label small text-uppercase text-muted fw-semibold">Estado final</label><span class="badge badge-soft-accent rounded-pill">${loan.status}</span></div>
        ${loan.notes ? `<div class="col-12"><label class="form-label small text-uppercase text-muted fw-semibold">Notas</label><p class="mb-0">${loan.notes}</p></div>` : ''}
      </div>
    `;
    
    const modal = new bootstrap.Modal(document.getElementById('modalHist'));
    modal.show();
  } catch (error) {
    console.error('Error loading detail:', error);
  }
};

loadHistorial();
</script>
</body>
</html>
