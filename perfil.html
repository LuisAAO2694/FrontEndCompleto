<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mi Perfil</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="custom.css" rel="stylesheet">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div class="topbar"><h5 class="fw-bold mb-0">Mi Perfil</h5><p class="small text-muted mb-0">Gestiona tu información personal</p></div>
  <div class="p-4">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body py-4">
            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold mx-auto mb-3" id="profile-avatar" style="width:72px;height:72px;font-size:22px;">?</div>
            <h5 class="fw-bold mb-1" id="profile-name">Cargando...</h5>
            <p class="text-muted small mb-3" id="profile-email">...</p>
            <div class="d-flex justify-content-center gap-2">
              <span class="badge badge-soft-info rounded-pill" id="profile-role">CARGANDO</span>
              <span class="badge badge-soft-success rounded-pill">Activo ✓</span>
            </div>
          </div>
          <div class="list-group list-group-flush text-start">
            <div class="list-group-item d-flex justify-content-between"><span class="text-muted small">Matrícula</span><code id="profile-studentid">—</code></div>
            <div class="list-group-item d-flex justify-content-between"><span class="text-muted small">Carrera</span><span class="small fw-semibold" id="profile-career">—</span></div>
            <div class="list-group-item d-flex justify-content-between"><span class="text-muted small">Teléfono</span><code id="profile-phone">—</code></div>
            <div class="list-group-item d-flex justify-content-between"><span class="text-muted small">Miembro desde</span><span class="small" id="profile-created">—</span></div>
            <div class="list-group-item d-flex justify-content-between"><span class="text-muted small">Total préstamos</span><span class="fw-bold" id="profile-total-loans">0</span></div>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card">
          <div class="card-header py-3 px-4"><span class="fw-bold"><i class="bi bi-pencil-fill me-2 text-primary"></i>Editar Información</span></div>
          <div class="card-body">
            <div class="alert alert-success d-none" id="ok-msg"><i class="bi bi-check-circle me-1"></i>Perfil actualizado correctamente.</div>
            <form id="profile-form" novalidate>
              <div class="row g-3">
                <div class="col-md-6"><label class="form-label small fw-semibold text-uppercase text-muted">Nombre completo *</label>
                  <input type="text" id="pnombre" class="form-control" required>
                  <div class="invalid-feedback">Mínimo 3 caracteres.</div></div>
                <div class="col-md-6"><label class="form-label small fw-semibold text-uppercase text-muted">Correo *</label>
                  <input type="email" id="pemail" class="form-control" required>
                  <div class="invalid-feedback">Correo inválido.</div></div>
                <div class="col-md-6"><label class="form-label small fw-semibold text-uppercase text-muted">Teléfono</label>
                  <input type="tel" id="ptel" class="form-control"></div>
                <div class="col-md-6"><label class="form-label small fw-semibold text-uppercase text-muted">Carrera</label>
                  <select id="pcareer" class="form-select">
                    <option value="">Selecciona...</option>
                    <option>Ing. en Sistemas Computacionales</option>
                    <option>Ing. Electrónica</option>
                    <option>Ing. Industrial</option>
                    <option>Ing. Mecánica</option>
                    <option>Ing. Química</option>
                  </select></div>
              </div>
              <hr class="my-4">
              <h6 class="fw-bold mb-3"><i class="bi bi-lock me-2"></i>Cambiar Contraseña</h6>
              <div class="row g-3">
                <div class="col-md-4"><label class="form-label small fw-semibold text-uppercase text-muted">Contraseña actual</label><input type="password" class="form-control" placeholder="••••••••"></div>
                <div class="col-md-4"><label class="form-label small fw-semibold text-uppercase text-muted">Nueva contraseña</label>
                  <input type="password" id="pnew" class="form-control" placeholder="Mín. 8 chars...">
                  <div class="invalid-feedback">No cumple los requisitos.</div></div>
                <div class="col-md-4"><label class="form-label small fw-semibold text-uppercase text-muted">Confirmar</label>
                  <input type="password" id="pconf" class="form-control" placeholder="••••••••">
                  <div class="invalid-feedback">No coinciden.</div></div>
              </div>
              <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-1"></i>Guardar Cambios</button>
                <button type="button" class="btn btn-outline-secondary" onclick="location.reload()">Cancelar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { getProfile, getUser, getMyLoans, showError, showSuccess, checkRole } from './api.js';

const user = getUser();
if (!user || (user.role !== 'estudiante' && user.role !== 'encargado')) {
    window.location.href = 'index.html';
}

buildNav(user.role, 'perfil.html');

async function loadProfile() {
  try {
    const [profile, loans] = await Promise.all([
      getProfile(),
      getMyLoans('all', 1, 1)
    ]);
    renderProfile(profile, loans.total);
  } catch (error) {
    console.error('Error loading profile:', error);
  }
}

function renderProfile(profile, totalLoans) {
  document.getElementById('profile-avatar').textContent = profile.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  document.getElementById('profile-name').textContent = profile.name;
  document.getElementById('profile-email').textContent = profile.email;
  document.getElementById('profile-role').textContent = profile.role === 'encargado' ? 'ENCARGADO' : 'ESTUDIANTE';

  document.getElementById('profile-studentid').textContent = profile.studentId || 'N/A';
  document.getElementById('profile-career').textContent = profile.career || 'N/A';
  document.getElementById('profile-phone').textContent = profile.phone || 'N/A';
  document.getElementById('profile-created').textContent = new Date(profile.createdAt).toLocaleDateString('es-MX', { month: 'short', year: 'numeric' });
  document.getElementById('profile-total-loans').textContent = totalLoans;

  document.getElementById('pnombre').value = profile.name || '';
  document.getElementById('pemail').value = profile.email || '';
  document.getElementById('ptel').value = profile.phone || '';
  if (profile.career) {
    document.getElementById('pcareer').value = profile.career;
  }
}

document.getElementById('profile-form').addEventListener('submit', function(e) {
  e.preventDefault();
  let ok = true;
  const n = document.getElementById('pnombre');
  const em = document.getElementById('pemail');
  const pn = document.getElementById('pnew');
  const pc = document.getElementById('pconf');

  if (n.value.trim().length < 3) { n.classList.add('is-invalid'); ok = false; } else n.classList.remove('is-invalid');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.value)) { em.classList.add('is-invalid'); ok = false; } else em.classList.remove('is-invalid');

  if (pn.value) {
    if (!/^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/.test(pn.value)) {
      pn.classList.add('is-invalid');
      ok = false;
    } else pn.classList.remove('is-invalid');
    if (pc.value !== pn.value) {
      pc.classList.add('is-invalid');
      ok = false;
    } else pc.classList.remove('is-invalid');
  }

  if (!ok) return;
  showSuccess('Perfil actualizado correctamente');
});

loadProfile();
</script>
</body>
</html>
